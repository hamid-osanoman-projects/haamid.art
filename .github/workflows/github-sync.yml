name: GitHub Stats Sync
on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2:00 AM UTC (6:00 AM Muscat time)
  workflow_dispatch:

jobs:
  sync-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @supabase/supabase-js
      - name: Query GitHub stats and update database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_STATS_TOKEN: ${{ secrets.GITHUB_STATS_TOKEN }}
          NEXT_PUBLIC_OWNER_EMAIL: ${{ secrets.NEXT_PUBLIC_OWNER_EMAIL }}
        run: node scripts/github-sync.js
